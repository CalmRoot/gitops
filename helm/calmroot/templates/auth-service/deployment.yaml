apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: auth-service
    environment: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.authService.replicaCount }}
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        role: backend
    spec:
      serviceAccountName: {{ .Values.authService.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: auth-service
          image: {{ .Values.global.image.registry }}/{{ .Values.authService.image.repository }}:{{ .Values.authService.image.tag }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.authService.port }}
          envFrom:
            - configMapRef:
                name: calmroot-config
          env:
            - name: PORT
              value: {{ .Values.authService.port | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authService.secrets.jwtSecretName }}
                  key: JWT_SECRET
            - name: SES_SENDER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authService.secrets.sesSecretName }}
                  key: SES_SENDER_EMAIL
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.authService.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.authService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.authService.resources.requests.cpu }}
              memory: {{ .Values.authService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.authService.resources.limits.cpu }}
              memory: {{ .Values.authService.resources.limits.memory }}
