global:
  image:
    registry: 006805625766.dkr.ecr.us-east-1.amazonaws.com
    pullPolicy: Always
  namespace: production

networkPolicy:
  enabled: true

frontend:
  name: frontend
  replicaCount: 2
  image:
    repository: calmroot/frontend
    tag: v1.0.0
  port: 8080
  serviceAccount:
    name: frontend-sa
    roleArn: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  hpa:
    minReplicas: 2
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70

authService:
  name: auth-service
  replicaCount: 2
  image:
    repository: calmroot/auth-service
    tag: v1.0.0
  port: 3001
  serviceAccount:
    name: auth-service-sa
    roleArn: "arn:aws:iam::006805625766:role/calmroot-auth-service-role"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    minReplicas: 2
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  env:
    NODE_ENV: production
    PORT: "3001"
    AWS_REGION: us-east-1
    DYNAMODB_USERS_TABLE: calmroot-users
    THERAPIST_SERVICE_URL: "http://therapist-service:3003"
  secrets:
    jwtSecretName: calmroot-jwt-secret
    sesSecretName: calmroot-ses-secret

assessmentService:
  name: assessment-service
  replicaCount: 2
  image:
    repository: calmroot/assessment-service
    tag: v1.0.0
  port: 3002
  serviceAccount:
    name: assessment-service-sa
    roleArn: "arn:aws:iam::006805625766:role/calmroot-assessment-service-role"
  resources:
    requests:
      cpu: 150m
      memory: 200Mi
    limits:
      cpu: 400m
      memory: 400Mi
  hpa:
    minReplicas: 2
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  env:
    NODE_ENV: production
    PORT: "3002"
    AWS_REGION: us-east-1
    DYNAMODB_ASSESSMENTS_TABLE: calmroot-assessments
    DYNAMODB_TEMPLATES_TABLE: calmroot-assessment-templates
    DYNAMODB_USERS_TABLE: calmroot-users
  secrets:
    jwtSecretName: calmroot-jwt-secret

therapistService:
  name: therapist-service
  replicaCount: 2
  image:
    repository: calmroot/therapist-service
    tag: v1.0.0
  port: 3003
  serviceAccount:
    name: therapist-service-sa
    roleArn: "arn:aws:iam::006805625766:role/calmroot-therapist-service-role"
  resources:
    requests:
      cpu: 150m
      memory: 200Mi
    limits:
      cpu: 400m
      memory: 400Mi
  hpa:
    minReplicas: 2
    maxReplicas: 2
    targetCPUUtilizationPercentage: 70
  env:
    NODE_ENV: production
    PORT: "3003"
    AWS_REGION: us-east-1
    DYNAMODB_SESSIONS_TABLE: calmroot-sessions
    DYNAMODB_USERS_TABLE: calmroot-users
    DYNAMODB_THERAPIST_PATIENTS_TABLE: calmroot-therapist-patients
    CLINICAL_NOTES_BUCKET: calmroot-clinical-notes
    EXPORTS_BUCKET: calmroot-daily-exports
  secrets:
    jwtSecretName: calmroot-jwt-secret

externalSecrets:
  refreshInterval: 1h
  secretStoreRef:
    name: calmroot-secret-store
    kind: ClusterSecretStore
  secrets:
    jwt:
      remoteRefKey: calmroot/prod/jwt
      targetSecretName: calmroot-jwt-secret
      dataKey: JWT_SECRET
    ses:
      remoteRefKey: calmroot/prod/ses
      targetSecretName: calmroot-ses-secret
      dataKey: SES_SENDER_EMAIL

gateway:
  name: calmroot-gateway
  className: calmroot-gateway-class
  namespace: production
